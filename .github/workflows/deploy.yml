name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Read version and build with run number
        run: |
          BASE_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          APP_VERSION="${BASE_VERSION}+${{ github.run_number }}"
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV
          flutter build web --release --base-href "/flutter_scratch_demo/" --pwa-strategy none --dart-define=APP_VERSION=$APP_VERSION

      - name: Cache-bust flutter_bootstrap.js
        run: sed -i "s|flutter_bootstrap.js|flutter_bootstrap.js?v=$(date +%s)|" build/web/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - id: deployment
        uses: actions/deploy-pages@v4
